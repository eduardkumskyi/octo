<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>octo · Mission Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0d10;
      --surface:     #13141a;
      --surface-2:   #181921;
      --accent:      #ff5fa2;
      --accent-dim:  rgba(255, 95, 162, 0.12);
      --accent-glow: rgba(255, 95, 162, 0.08);
      --text:        #e8e8ea;
      --text-2:      #9a9aa2;
      --text-3:      #55555e;
      --border:      #1e1f2a;
      --border-2:    #252633;
      --green:       #4ade80;
      --green-dim:   rgba(74, 222, 128, 0.10);
      --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
      --sans: system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 32px 14px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 6px;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .logo-name {
      color: var(--accent);
      font-weight: 600;
    }

    .header-chips {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    #mode-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(255, 95, 162, 0.22);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    #mode-badge:empty { display: none; }

    #phase {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
    }

    #updated-ago {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }

    #mission {
      font-size: 21px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    /* ── Wave motif ─────────────────────────────────────────── */
    .wave-bar {
      height: 18px;
      overflow: hidden;
      position: relative;
    }

    .wave-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 100%;
      animation: wave-scroll 9s linear infinite;
    }

    @keyframes wave-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Main layout ────────────────────────────────────────── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 32px 56px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .empty-state {
      color: var(--text-3);
      font-size: 13px;
      font-style: italic;
    }

    /* ── Board (kanban) ─────────────────────────────────────── */
    .kanban-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .kanban-col { display: flex; flex-direction: column; gap: 8px; }

    .col-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 2px;
    }

    .col-header.h-pending    { color: var(--text-3); border-color: var(--border); }
    .col-header.h-in_progress{ color: var(--green);  border-color: var(--green); }
    .col-header.h-verified   { color: var(--accent); border-color: var(--accent); }
    .col-header.h-parked     { color: var(--text-3); border-color: var(--text-3); border-style: dashed; }

    .ms-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      transition: border-color 0.2s;
    }

    .ms-card.c-in_progress {
      border-color: rgba(74, 222, 128, 0.28);
      background: var(--green-dim);
      animation: card-breathe 3s ease-in-out infinite;
    }

    .ms-card.c-verified {
      border-color: rgba(255, 95, 162, 0.28);
      background: var(--accent-glow);
    }

    .ms-card.c-parked {
      opacity: 0.45;
      border-style: dashed;
    }

    @keyframes card-breathe {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50%       { box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.07); }
    }

    .ms-id {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
    }

    .ms-title {
      font-size: 13px;
      color: var(--text);
    }

    .ms-check {
      position: absolute;
      top: 9px;
      right: 10px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
    }

    .col-empty {
      color: var(--text-3);
      font-size: 12px;
      padding: 6px 0;
      text-align: center;
    }

    /* ── Lanes ──────────────────────────────────────────────── */
    .lane-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-2);
      border: 1px solid rgba(74, 222, 128, 0.22);
      border-radius: 6px;
      padding: 11px 14px;
      margin-bottom: 8px;
      animation: lane-pulse 3s ease-in-out infinite;
    }

    .lane-card:last-child { margin-bottom: 0; }

    @keyframes lane-pulse {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50%       { box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.06); }
    }

    .lane-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }

    .lane-info { flex: 1; min-width: 0; }

    .lane-agent {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      margin-bottom: 2px;
      letter-spacing: 0.04em;
    }

    .lane-task {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lane-elapsed {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
    }

    /* ── Decisions ──────────────────────────────────────────── */
    .decision-item {
      display: flex;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }

    .decision-item:last-child { border-bottom: none; }

    .dec-ts {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      flex-shrink: 0;
      padding-top: 2px;
    }

    .dec-text {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.4;
    }

    /* ── Burndown ───────────────────────────────────────────── */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: 88px;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      max-width: 64px;
      height: 100%;
    }

    .bar-wrap {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: flex-end;
    }

    .bar {
      width: 100%;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      opacity: 0.85;
      transition: height 0.35s ease;
    }

    .bar-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
    }

    .bar-val {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
    }

    /* ── ETA ────────────────────────────────────────────────── */
    .eta-number {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 10px;
    }

    .eta-basis {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      line-height: 1.6;
    }

    .eta-remaining {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text-2);
    }

    /* ── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <span class="logo">🐙 <span class="logo-name">octo</span></span>
      <div class="header-chips">
        <span id="mode-badge"></span>
        <span id="phase"></span>
        <span id="updated-ago"></span>
      </div>
    </div>
    <h1 id="mission">waiting for a run…</h1>
  </div>
  <div class="wave-bar">
    <svg class="wave-svg" viewBox="0 0 2400 18" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,9 C200,1 400,17 600,9 C800,1 1000,17 1200,9 C1400,1 1600,17 1800,9 C2000,1 2200,17 2400,9"
            fill="none" stroke="#ff5fa2" stroke-width="1.4" stroke-opacity="0.32"/>
    </svg>
  </div>
</header>

<main>

  <!-- Board -->
  <div id="board" class="section">
    <div class="section-label">Milestones</div>
    <div class="kanban-grid" id="board-grid">
      <div class="col-empty empty-state">waiting for a run…</div>
    </div>
  </div>

  <!-- Lanes + Decisions -->
  <div class="grid-2">
    <div id="lanes" class="section">
      <div class="section-label">Active Lanes</div>
      <div id="lanes-body"><p class="empty-state">No active lanes</p></div>
    </div>
    <div id="decisions" class="section">
      <div class="section-label">Decisions</div>
      <div id="decisions-body"><p class="empty-state">No decisions yet</p></div>
    </div>
  </div>

  <!-- Burndown + ETA -->
  <div class="grid-2">
    <div id="burndown" class="section">
      <div class="section-label">Findings / Iteration</div>
      <div id="burndown-body"><p class="empty-state">No findings yet</p></div>
    </div>
    <div id="eta" class="section">
      <div class="section-label">ETA</div>
      <div id="eta-body"><p class="eta-remaining">—</p></div>
    </div>
  </div>

</main>

<script>
(function () {
  'use strict';

  var POLL_MS = 2000;
  var COLS = ['PENDING', 'IN_PROGRESS', 'VERIFIED', 'PARKED'];

  var _state  = null;
  var _events = [];

  /* ── Helpers ──────────────────────────────────────────── */

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function agoStr(iso) {
    var s = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 60)  return s + 's ago';
    var m = Math.round(s / 60);
    if (m < 60)  return m + 'm ago';
    return Math.round(m / 60) + 'h ago';
  }

  function elapsedStr(iso) {
    var s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 0) s = 0;
    var m = Math.floor(s / 60);
    var h = Math.floor(m / 60);
    if (h > 0)  return h + 'h ' + (m % 60) + 'm';
    if (m > 0)  return m + 'm ' + (s % 60) + 's';
    return s + 's';
  }

  function fmtTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch (e) {
      return iso || '';
    }
  }

  function set(id, html) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = html;
  }

  /* ── Fetch ────────────────────────────────────────────── */

  function fetchState(cb) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/run/state.json');
    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) return;
      if (xhr.status === 200) {
        try { cb(JSON.parse(xhr.responseText)); } catch (e) { cb(null); }
      } else {
        cb(null);
      }
    };
    xhr.send();
  }

  function fetchEvents(cb) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/run/events.jsonl');
    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) return;
      if (xhr.status !== 200) { cb([]); return; }
      var lines = xhr.responseText.split('\n');
      var result = [];
      for (var i = 0; i < lines.length; i++) {
        var l = lines[i].trim();
        if (!l) continue;
        try { result.push(JSON.parse(l)); } catch (e) { /* skip malformed */ }
      }
      cb(result);
    };
    xhr.send();
  }

  /* ── Render: Header ───────────────────────────────────── */

  function renderHeader(state) {
    var mission = document.getElementById('mission');
    var badge   = document.getElementById('mode-badge');
    var phase   = document.getElementById('phase');
    var ago     = document.getElementById('updated-ago');

    if (!state) {
      if (mission) mission.textContent = 'waiting for a run…';
      if (badge)   badge.textContent  = '';
      if (phase)   phase.textContent  = '';
      if (ago)     ago.textContent    = '';
      return;
    }

    if (mission) mission.textContent = state.mission || '—';
    if (badge)   badge.textContent   = state.mode   || '';
    if (phase)   phase.textContent   = state.phase  || '';
    if (ago && state.updated) ago.textContent = 'updated ' + agoStr(state.updated);
  }

  /* ── Render: Board ────────────────────────────────────── */

  function renderBoard(state) {
    if (!state || !state.milestones) {
      set('board-grid', '<div class="col-empty empty-state">waiting for a run…</div>');
      return;
    }

    var byStatus = {};
    COLS.forEach(function (c) { byStatus[c] = []; });
    state.milestones.forEach(function (m) {
      var s = m.status && byStatus[m.status] ? m.status : 'PENDING';
      byStatus[s].push(m);
    });

    var html = COLS.map(function (col) {
      var cls   = col.toLowerCase();
      var label = col.replace('_', ' ');
      var cards = byStatus[col];

      var cardsHtml = cards.length
        ? cards.map(function (m) {
            return '<div class="ms-card c-' + cls + '">'
              + '<span class="ms-id">' + esc(m.id) + '</span>'
              + '<span class="ms-title">' + esc(m.title) + '</span>'
              + (col === 'VERIFIED' ? '<span class="ms-check">&#x2713;</span>' : '')
              + '</div>';
          }).join('')
        : '<div class="col-empty">—</div>';

      return '<div class="kanban-col">'
        + '<div class="col-header h-' + cls + '">' + esc(label) + '</div>'
        + '<div class="col-cards">' + cardsHtml + '</div>'
        + '</div>';
    }).join('');

    set('board-grid', html);
  }

  /* ── Render: Lanes ────────────────────────────────────── */

  function renderLanes(state) {
    if (!state || !state.lanes || !state.lanes.length) {
      set('lanes-body', '<p class="empty-state">No active lanes</p>');
      return;
    }

    var html = state.lanes.map(function (lane) {
      return '<div class="lane-card">'
        + '<div class="lane-dot"></div>'
        + '<div class="lane-info">'
        +   '<div class="lane-agent">' + esc(lane.agent) + '</div>'
        +   '<div class="lane-task">' + esc(lane.task) + '</div>'
        + '</div>'
        + '<div class="lane-elapsed" data-started="' + esc(lane.started) + '">'
        +   elapsedStr(lane.started)
        + '</div>'
        + '</div>';
    }).join('');

    set('lanes-body', html);
  }

  /* ── Render: Decisions ────────────────────────────────── */

  function renderDecisions(events) {
    var decisions = events.filter(function (e) { return e.type === 'decision'; });
    decisions = decisions.slice().reverse();

    if (!decisions.length) {
      set('decisions-body', '<p class="empty-state">No decisions yet</p>');
      return;
    }

    var html = decisions.map(function (e) {
      var text = e.text || e.summary || e.id || '';
      return '<div class="decision-item">'
        + '<span class="dec-ts">' + esc(fmtTime(e.ts)) + '</span>'
        + '<span class="dec-text">' + esc(text) + '</span>'
        + '</div>';
    }).join('');

    set('decisions-body', html);
  }

  /* ── Render: Burndown ─────────────────────────────────── */

  function renderBurndown(events) {
    var findings = events.filter(function (e) { return e.type === 'finding'; });

    if (!findings.length) {
      set('burndown-body', '<p class="empty-state">No findings yet</p>');
      return;
    }

    var byIter = {};
    findings.forEach(function (f) {
      var k = f.iteration != null ? String(f.iteration) : '1';
      byIter[k] = (byIter[k] || 0) + 1;
    });

    var iters  = Object.keys(byIter).sort(function (a, b) { return +a - +b; });
    var maxVal = 0;
    iters.forEach(function (k) { if (byIter[k] > maxVal) maxVal = byIter[k]; });

    var bars = iters.map(function (k) {
      var pct = maxVal ? Math.round(byIter[k] / maxVal * 100) : 0;
      return '<div class="bar-group">'
        + '<div class="bar-wrap"><div class="bar" style="height:' + pct + '%"></div></div>'
        + '<div class="bar-label">i' + esc(k) + '</div>'
        + '<div class="bar-val">' + byIter[k] + '</div>'
        + '</div>';
    }).join('');

    set('burndown-body', '<div class="bar-chart">' + bars + '</div>');
  }

  /* ── Render: ETA ──────────────────────────────────────── */

  function renderEta(state, events) {
    var verifiedEvts = events.filter(function (e) {
      return e.type === 'milestone' && e.status === 'VERIFIED';
    });

    var total     = state && state.milestones ? state.milestones.length : 0;
    var doneCount = state && state.milestones
      ? state.milestones.filter(function (m) { return m.status === 'VERIFIED'; }).length
      : 0;
    var remaining = total - doneCount;

    if (verifiedEvts.length < 2) {
      set('eta-body',
        '<p class="eta-remaining">' + remaining
        + ' milestone' + (remaining !== 1 ? 's' : '') + ' remaining</p>');
      return;
    }

    var ts = verifiedEvts
      .map(function (e) { return new Date(e.ts).getTime(); })
      .sort(function (a, b) { return a - b; });

    var durs = [];
    for (var i = 1; i < ts.length; i++) durs.push(ts[i] - ts[i - 1]);
    var meanMs  = durs.reduce(function (a, b) { return a + b; }, 0) / durs.length;
    var meanMin = Math.round(meanMs / 60000);
    var etaMin  = remaining * meanMin;
    var spanMin = Math.round((ts[ts.length - 1] - ts[0]) / 60000);

    set('eta-body',
      '<div class="eta-number">' + etaMin + 'm</div>'
      + '<div class="eta-basis">'
      + verifiedEvts.length + ' milestones in ' + spanMin + 'm'
      + ' &rarr; ' + remaining + ' left &asymp; ' + etaMin + 'm at current pace'
      + '</div>');
  }

  /* ── Tick: update elapsed without re-fetching ─────────── */

  function tickElapsed() {
    var els = document.querySelectorAll('.lane-elapsed[data-started]');
    for (var i = 0; i < els.length; i++) {
      els[i].textContent = elapsedStr(els[i].getAttribute('data-started'));
    }
  }

  /* ── Poll ─────────────────────────────────────────────── */

  function poll() {
    fetchState(function (state) {
      _state = state;
      fetchEvents(function (events) {
        _events = events;
        renderHeader(_state);
        renderBoard(_state);
        renderLanes(_state);
        renderDecisions(_events);
        renderBurndown(_events);
        renderEta(_state, _events);
      });
    });
  }

  poll();
  setInterval(poll,        POLL_MS);
  setInterval(tickElapsed, 1000);

}());
</script>
</body>
</html>
