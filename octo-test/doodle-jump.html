<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Jump</title>
<style>
  :root { --w: 400px; --h: 600px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #2b2d42;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    width: var(--w);
    height: var(--h);
    max-width: 100vw;
    max-height: 100vh;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: linear-gradient(#dff6ff, #aee7ff);
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    image-rendering: -webkit-optimize-contrast;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #2b2d42;
    background: rgba(223, 246, 255, 0.82);
    border-radius: 12px;
    padding: 24px;
    gap: 10px;
    backdrop-filter: blur(2px);
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 42px; letter-spacing: 1px; color: #ef476f; }
  .overlay h2 { font-size: 28px; color: #ef476f; }
  .overlay p { font-size: 16px; line-height: 1.5; color: #3d405b; }
  .overlay .score { font-size: 20px; font-weight: 700; }
  .overlay .hint {
    margin-top: 8px;
    font-size: 14px;
    color: #3d405b;
    opacity: 0.8;
  }
  .btn {
    margin-top: 6px;
    padding: 10px 22px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: #06d6a0;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 4px 0 #04b183;
    transition: transform .06s ease;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #04b183; }
  #hud {
    position: absolute;
    top: 10px;
    left: 12px;
    font-size: 18px;
    font-weight: 700;
    color: #3d405b;
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="600"></canvas>
  <div id="hud"></div>

  <div id="startOverlay" class="overlay">
    <h1>Doodle Jump</h1>
    <p>Bounce as high as you can.<br>Don't fall!</p>
    <p class="hint">← → or A / D to move &nbsp;·&nbsp; touch left / right half on mobile</p>
    <button class="btn" id="startBtn">Play</button>
  </div>

  <div id="overOverlay" class="overlay hidden">
    <h2>Game Over</h2>
    <p class="score" id="finalScore">Score: 0</p>
    <p id="bestScore">Best: 0</p>
    <button class="btn" id="restartBtn">Play again</button>
    <p class="hint">or press Space / Enter</p>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---- Constants ---------------------------------------------------------
  var W = 400, H = 600;
  var GRAVITY = 0.35;
  var JUMP_V = -12;            // bounce impulse (negative = up)
  var MOVE_ACCEL = 0.9;
  var MOVE_MAX = 7;
  var FRICTION = 0.82;
  var PLAYER_W = 46, PLAYER_H = 46;
  var PLAT_W = 68, PLAT_H = 16;
  var PLAT_GAP_MIN = 70, PLAT_GAP_MAX = 115;
  var SCROLL_LINE = H * 0.42;  // camera starts scrolling when player rises above this

  var PLAT_NORMAL = 0, PLAT_MOVING = 1, PLAT_BREAK = 2;
  var STATE_START = 0, STATE_PLAYING = 1, STATE_OVER = 2;

  // ---- Setup -------------------------------------------------------------
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var hud = document.getElementById("hud");
  var startOverlay = document.getElementById("startOverlay");
  var overOverlay = document.getElementById("overOverlay");
  var finalScoreEl = document.getElementById("finalScore");
  var bestScoreEl = document.getElementById("bestScore");

  var BEST_KEY = "doodleJumpBest";

  var state = STATE_START;
  var player, platforms, cameraY, score, best;
  var keys = { left: false, right: false };
  var rngSeed = 123456789;

  // Deterministic-ish PRNG so behavior is testable/reproducible if seeded.
  function rand() {
    // xorshift32
    rngSeed ^= rngSeed << 13; rngSeed |= 0;
    rngSeed ^= rngSeed >>> 17;
    rngSeed ^= rngSeed << 5; rngSeed |= 0;
    return ((rngSeed >>> 0) % 100000) / 100000;
  }
  function randRange(a, b) { return a + rand() * (b - a); }

  function loadBest() {
    try {
      var v = window.localStorage.getItem(BEST_KEY);
      return v ? parseInt(v, 10) || 0 : 0;
    } catch (e) { return 0; }
  }
  function saveBest(v) {
    try { window.localStorage.setItem(BEST_KEY, String(v)); } catch (e) { /* ignore */ }
  }

  // ---- Game objects ------------------------------------------------------
  function makePlatform(x, y, type) {
    return {
      x: x, y: y, w: PLAT_W, h: PLAT_H,
      type: type,
      dir: rand() < 0.5 ? -1 : 1,   // moving platforms
      speed: randRange(1.0, 2.2),
      broken: false,
      breaking: false,
      breakT: 0
    };
  }

  function pickType(heightClimbed) {
    var r = rand();
    // Difficulty ramps with height: more moving/breakable platforms higher up.
    var diff = Math.min(heightClimbed / 4000, 1);
    if (r < 0.12 + 0.13 * diff) return PLAT_BREAK;
    if (r < 0.30 + 0.25 * diff) return PLAT_MOVING;
    return PLAT_NORMAL;
  }

  function reset() {
    rngSeed = 123456789 ^ (Date.now() & 0xffffff);
    score = 0;
    cameraY = 0;
    best = loadBest();

    player = {
      x: W / 2 - PLAYER_W / 2,
      y: H - 120,
      w: PLAYER_W,
      h: PLAYER_H,
      vx: 0,
      vy: JUMP_V,
      facing: 1
    };

    platforms = [];
    // Guaranteed starting platform directly under the player.
    platforms.push(makePlatform(W / 2 - PLAT_W / 2, H - 60, PLAT_NORMAL));
    // Fill the initial screen upward with normal-biased platforms.
    var y = H - 60;
    while (y > -PLAT_GAP_MAX) {
      y -= randRange(PLAT_GAP_MIN, PLAT_GAP_MAX);
      var type = rand() < 0.75 ? PLAT_NORMAL : PLAT_MOVING; // gentle start
      platforms.push(makePlatform(randRange(0, W - PLAT_W), y, type));
    }
  }

  // Ensure platforms always exist above the current view.
  function ensurePlatforms() {
    var highest = Infinity;
    for (var i = 0; i < platforms.length; i++) {
      if (platforms[i].y < highest) highest = platforms[i].y;
    }
    // Guard: if platforms[] is ever empty, seed from the camera so the
    // fill loop below terminates instead of spinning on Infinity.
    if (highest === Infinity) highest = cameraY;
    // World-space top edge of the visible area.
    var topVisible = cameraY - PLAT_GAP_MAX;
    while (highest > topVisible) {
      highest -= randRange(PLAT_GAP_MIN, PLAT_GAP_MAX);
      var type = pickType(-highest);
      platforms.push(makePlatform(randRange(0, W - PLAT_W), highest, type));
    }
  }

  function cull() {
    var bottom = cameraY + H + 40;
    platforms = platforms.filter(function (p) {
      return p.y < bottom && !p.broken;
    });
  }

  // ---- Update ------------------------------------------------------------
  function update() {
    // Horizontal input.
    if (keys.left) { player.vx -= MOVE_ACCEL; player.facing = -1; }
    if (keys.right) { player.vx += MOVE_ACCEL; player.facing = 1; }
    if (!keys.left && !keys.right) player.vx *= FRICTION;
    if (player.vx > MOVE_MAX) player.vx = MOVE_MAX;
    if (player.vx < -MOVE_MAX) player.vx = -MOVE_MAX;

    player.x += player.vx;
    // Screen wraparound.
    if (player.x + player.w < 0) player.x = W;
    else if (player.x > W) player.x = -player.w;

    // Gravity + vertical motion.
    player.vy += GRAVITY;
    player.y += player.vy;

    // Move platforms (moving type) and advance break animation.
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      if (p.type === PLAT_MOVING) {
        p.x += p.dir * p.speed;
        if (p.x <= 0) { p.x = 0; p.dir = 1; }
        else if (p.x + p.w >= W) { p.x = W - p.w; p.dir = -1; }
      }
      if (p.breaking) {
        p.breakT += 1;
        p.y += 4; // falls away
        if (p.breakT > 40) p.broken = true;
      }
    }

    // Collision: only when falling, feet crossing the platform top.
    if (player.vy > 0) {
      var feetPrev = player.y + player.h - player.vy;
      var feet = player.y + player.h;
      for (var j = 0; j < platforms.length; j++) {
        var pl = platforms[j];
        if (pl.breaking || pl.broken) continue;
        var withinX = player.x + player.w > pl.x + 4 && player.x < pl.x + pl.w - 4;
        var crossedTop = feetPrev <= pl.y && feet >= pl.y;
        if (withinX && crossedTop) {
          if (pl.type === PLAT_BREAK) {
            pl.breaking = true; // gives way — no bounce
          } else {
            player.y = pl.y - player.h;
            player.vy = JUMP_V;
          }
          break;
        }
      }
    }

    // Camera follows player upward; score tracks max height climbed.
    if (player.y < cameraY + SCROLL_LINE) {
      cameraY = player.y - SCROLL_LINE;
    }
    var climbed = Math.max(0, Math.floor((-cameraY) / 10));
    if (climbed > score) score = climbed;

    ensurePlatforms();
    cull();

    // Death: player falls below the bottom of the visible area.
    if (player.y > cameraY + H) {
      gameOver();
    }
  }

  function gameOver() {
    state = STATE_OVER;
    if (score > best) { best = score; saveBest(best); }
    finalScoreEl.textContent = "Score: " + score;
    bestScoreEl.textContent = "Best: " + best;
    overOverlay.classList.remove("hidden");
  }

  // ---- Render ------------------------------------------------------------
  function drawPlatform(p) {
    var sy = p.y - cameraY;
    if (sy < -PLAT_H || sy > H) return;
    var color, edge;
    if (p.type === PLAT_NORMAL) { color = "#06d6a0"; edge = "#04b183"; }
    else if (p.type === PLAT_MOVING) { color = "#118ab2"; edge = "#0b6a8a"; }
    else { color = "#e0a458"; edge = "#b57e34"; } // breakable
    if (p.breaking) { ctx.globalAlpha = Math.max(0, 1 - p.breakT / 40); }
    roundRect(p.x, sy, p.w, p.h, 7);
    ctx.fillStyle = color; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = edge; ctx.stroke();
    if (p.type === PLAT_BREAK) {
      // crack line
      ctx.beginPath();
      ctx.moveTo(p.x + p.w * 0.3, sy);
      ctx.lineTo(p.x + p.w * 0.45, sy + p.h);
      ctx.strokeStyle = edge; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer() {
    var sy = player.y - cameraY;
    var x = player.x, w = player.w, h = player.h;
    // body
    roundRect(x, sy, w, h, 12);
    ctx.fillStyle = "#ffd166"; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = "#e0a458"; ctx.stroke();
    // legs (spring feet)
    ctx.fillStyle = "#e0a458";
    ctx.fillRect(x + 8, sy + h - 3, 8, 6);
    ctx.fillRect(x + w - 16, sy + h - 3, 8, 6);
    // eyes
    var ex = player.facing >= 0 ? x + w - 18 : x + 8;
    ctx.fillStyle = "#3d405b";
    ctx.beginPath(); ctx.arc(ex, sy + 16, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex + player.facing * 12, sy + 16, 4, 0, Math.PI * 2); ctx.fill();
    // nose/smile
    ctx.strokeStyle = "#3d405b"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x + w / 2, sy + 28, 7, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < platforms.length; i++) drawPlatform(platforms[i]);
    if (state !== STATE_START) drawPlayer();
    hud.textContent = state === STATE_START ? "" : String(score);
  }

  // ---- Loop --------------------------------------------------------------
  function frame() {
    if (state === STATE_PLAYING) update();
    render();
    window.requestAnimationFrame(frame);
  }

  // ---- Controls ----------------------------------------------------------
  function startGame() {
    reset();
    state = STATE_PLAYING;
    startOverlay.classList.add("hidden");
    overOverlay.classList.add("hidden");
  }

  function onKeyDown(e) {
    var k = e.key;
    if (k === "ArrowLeft" || k === "a" || k === "A") keys.left = true;
    else if (k === "ArrowRight" || k === "d" || k === "D") keys.right = true;
    else if (k === " " || k === "Enter") {
      if (state === STATE_START || state === STATE_OVER) { startGame(); }
    }
    if (k === "ArrowLeft" || k === "ArrowRight" || k === " ") {
      if (e.preventDefault) e.preventDefault();
    }
  }
  function onKeyUp(e) {
    var k = e.key;
    if (k === "ArrowLeft" || k === "a" || k === "A") keys.left = false;
    else if (k === "ArrowRight" || k === "d" || k === "D") keys.right = false;
  }

  // Touch / pointer: hold left or right half of the canvas to move.
  function pointerMove(clientX) {
    var rect = canvas.getBoundingClientRect();
    var relX = clientX - rect.left;
    if (relX < rect.width / 2) { keys.left = true; keys.right = false; }
    else { keys.right = true; keys.left = false; }
  }
  function pointerEnd() { keys.left = false; keys.right = false; }

  canvas.addEventListener("touchstart", function (e) {
    if (e.changedTouches.length) pointerMove(e.changedTouches[0].clientX);
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener("touchmove", function (e) {
    if (e.changedTouches.length) pointerMove(e.changedTouches[0].clientX);
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener("touchend", function (e) { pointerEnd(); e.preventDefault(); }, { passive: false });
  canvas.addEventListener("touchcancel", function (e) { pointerEnd(); e.preventDefault(); }, { passive: false });

  window.addEventListener("keydown", onKeyDown);
  window.addEventListener("keyup", onKeyUp);
  // Release held movement keys if the window loses focus, so the doodle
  // doesn't keep drifting when a key-up never arrives (alt-tab, OS shortcut).
  window.addEventListener("blur", function () { keys.left = false; keys.right = false; });
  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("restartBtn").addEventListener("click", startGame);

  // ---- Boot --------------------------------------------------------------
  reset();          // populate platforms + init best; gives start screen a backdrop
  state = STATE_START;
  window.requestAnimationFrame(frame);

  // Expose a tiny hook for headless/automated smoke testing.
  window.__doodle = {
    getState: function () { return state; },
    start: startGame,
    tick: function (n) { for (var i = 0; i < (n || 1); i++) update(); },
    snapshot: function () {
      return { state: state, score: score, cameraY: cameraY,
               px: player.x, py: player.y, vy: player.vy,
               platforms: platforms.length };
    },
    press: function (dir, down) { keys[dir] = !!down; }
  };
})();
</script>
</body>
</html>
